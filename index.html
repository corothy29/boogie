<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boogie</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .bg-glow::before,
    .bg-glow::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
    }

    .bg-glow::before {
      width: 420px;
      height: 420px;
      top: -120px;
      left: -80px;
      background: #7c3aed;
    }

    .bg-glow::after {
      width: 360px;
      height: 360px;
      bottom: -100px;
      right: -60px;
      background: #2563eb;
    }

    main {
      position: relative;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.9s ease-out both;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      background: linear-gradient(to right, #fff 30%, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: rgba(255, 255, 255, 0.65);
      font-weight: 400;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>
  <main>
    <h1>환영합니다</h1>
    <p>boogie 프로젝트에 오신 것을 환영합니다</p>
  </main>
</body>
</html>
